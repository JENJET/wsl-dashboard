[about]
title = "Ohjelmiston esittely"
description = "WSL Dashboard on avoimen lähdekoodin visuaalinen hallintatyökalu Windows Subsystem for Linuxille (WSL). Se tarjoaa käyttäjille intuitiivisen graafisen käyttöliittymän Linux-jakeluiden tehokkaaseen hallintaan, tukien ydintoimintoja kuten yhden napsautuksen käynnistystä, pysäytystä, uudelleenkäynnistystä, kloonausta ja varmuuskopioiden vientiä. Se sisältää myös sisäänrakennetun jakelukaupan, mikä tekee WSL:n hallinnasta ja käytöstä yksinkertaisempaa ja kätevämpää."
version = "Versio"
updates = "(Tarkista päivitykset)"
