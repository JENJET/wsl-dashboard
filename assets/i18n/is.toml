[about]
title = "Kynning á hugbúnaði"
description = "WSL Dashboard er myndrænt stjórnunartól með opinn grunnkóða fyrir Windows Subsystem for Linux (WSL). Það veitir notendum leiðandi myndrænt viðmót til að stjórna Linux dreifingum á skilvirkan hátt og styður grunnaðgerðir eins og að ræsa, stöðva, endurræsa, klóna og flytja út afrit með einum smelli. Það inniheldur einnig innbyggða dreifingarverslun, sem gerir stjórnun og notkun WSL einfaldari og þægilegri."
version = "Útgáfa"

updates = "(Leitaðu að uppfærslum)"
check_update = "Leita að uppfærslum..."
new_version = "Ný útgáfa er fáanleg: v{0}"
homepage = "Heimasíða verkefnis"
group = "Gakktu til liðs við opinbera samskiptahópinn"
issues = "Vandamál (Tilkynna villur, biðja um nýja eiginleika)"
discussions = "Umræður (Spurningar og svör, deila hugmyndum, tilkynningar)"
star = "Ef þér finnst þetta verkefni gagnlegt væri ég þakklátur ef þú gætir gefið því stjörnu á GitHub. Stuðningur þinn hjálpar því að ná til breiðari hóps og er mikils metinn. Það er þessi hvatning sem dregur mig áfram í þróuninni."
love = "Gert af ást"

